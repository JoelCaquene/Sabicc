{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SABIC - Cadastro Dinâmico</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #0055a4;
            --accent-cyan: #00d4ff;
            --glass-bg: rgba(255, 255, 255, 0.82);
            --glass-border: rgba(255, 255, 255, 0.4);
            /* Cor padrão do fundo (Angola) */
            --bg-country: linear-gradient(135deg, #ce1126 0%, #000000 50%, #f9d616 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-country);
            background-attachment: fixed;
            background-size: cover;
            transition: background 0.8s ease; /* Transição suave ao mudar de país */
            overflow-x: hidden;
        }

        /* CABEÇALHO ELETROQUÍMICO */
        .header-electro {
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .sabic-logo-text {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 10px;
            z-index: 2;
            text-shadow: 0 0 20px var(--accent-cyan);
            animation: pulse-glow 2s infinite alternate;
        }

        /* CONTAINER GLASSMORPHISM */
        .auth-tabs {
            display: flex;
            width: 92%;
            max-width: 450px;
            z-index: 5;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid var(--glass-border);
            border-bottom: none;
            border-radius: 20px 20px 0 0;
        }

        .tab.active {
            background: var(--glass-bg);
            color: var(--primary-blue);
        }

        .register-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 20px;
            width: 92%;
            max-width: 450px;
            border-radius: 0 0 25px 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        /* FORMULÁRIOS */
        .form-group { margin-bottom: 18px; text-align: left; }
        
        .form-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #444;
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.main-icon {
            position: absolute;
            left: 15px;
            font-size: 1.1rem;
            color: var(--primary-blue);
            z-index: 5;
        }

        /* SELETOR DE PAÍS ESTILIZADO */
        .country-select {
            position: absolute;
            left: 42px;
            border: none;
            background: rgba(255,255,255,0.5);
            padding: 5px;
            border-radius: 8px;
            font-weight: 700;
            color: #333;
            z-index: 5;
            outline: none;
            cursor: pointer;
            width: 75px;
            font-size: 0.9rem;
        }

        .auth-form input {
            width: 100%;
            padding: 16px 15px 16px 50px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.9);
            font-size: 1rem;
            transition: 0.3s;
        }

        .phone-input { padding-left: 125px !important; }

        .auth-form input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 10px rgba(0,85,164,0.2);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: #999;
            z-index: 10;
        }

        .submit-button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #0055a4, #002d5a);
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        @keyframes pulse-glow {
            from { text-shadow: 0 0 10px var(--accent-cyan); transform: scale(1); }
            to { text-shadow: 0 0 25px var(--accent-cyan), 0 0 40px var(--accent-cyan); transform: scale(1.05); }
        }
    </style>
</head>
<body id="dynamic-body">

    <header class="header-electro">
        <div class="sabic-logo-text">SABIC</div>
    </header>

    <div class="auth-tabs">
        <a href="{% url 'login' %}" class="tab">ENTRAR</a>
        <a href="#" class="tab active">CADASTRAR</a>
    </div>

    <div class="register-container">
        <form method="post" class="auth-form" id="registerForm">
            {% csrf_token %}

            <div class="form-group">
                <label>Número de Telefone</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-phone main-icon"></i>
                    <select class="country-select" name="country_code" id="countrySelector" onchange="changeTheme()">
                        <option value="+244" data-bg="linear-gradient(135deg, #ce1126 0%, #000000 50%, #f9d616 100%)">🇦🇴 +244</option>
                        <option value="+351" data-bg="linear-gradient(135deg, #006600 50%, #ff0000 50%)">🇵🇹 +351</option>
                        <option value="+55" data-bg="linear-gradient(135deg, #009c3b 0%, #ffdf00 50%, #002776 100%)">🇧🇷 +55</option>
                        <option value="+238" data-bg="linear-gradient(135deg, #003893 0%, #ffffff 40%, #cf2027 100%)">🇨🇻 +238</option>
                        <option value="+239" data-bg="linear-gradient(135deg, #12ad2b 0%, #ffce00 50%, #ff0000 100%)">🇸🇹 +239</option>
                        <option value="+258" data-bg="linear-gradient(135deg, #009739 0%, #000000 50%, #ffd200 100%)">🇲🇿 +258</option>
                    </select>
                    <input type="tel" name="phone_number" class="phone-input" placeholder="Usa o seu Número" required>
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock-open main-icon"></i>
                    <input type="password" name="password" id="password" placeholder="Sua senha secreta" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('password', this)"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Confirmar Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-shield-halved main-icon"></i>
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Repita com atenção" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('confirm_password', this)"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Convite Especial</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-gift main-icon"></i>
                    <input type="text" id="invite_code" name="invited_by_code" placeholder="Código de indicação" value="{{ request.GET.invite|default:'' }}">
                </div>
            </div>
            
            <button type="submit" class="submit-button">
                <span>CONCLUIR</span>
                <i class="fa-solid fa-rocket"></i>
            </button>
        </form>
    </div>

    <script>
        // Função para mudar o fundo de acordo com o país
        function changeTheme() {
            const select = document.getElementById('countrySelector');
            const selectedOption = select.options[select.selectedIndex];
            const newBg = selectedOption.getAttribute('data-bg');
            document.body.style.background = newBg;
        }

        function togglePass(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                el.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                el.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
        
        // Iniciar com o tema do primeiro país da lista
        window.onload = changeTheme;
    </script>

</body>
</html>
